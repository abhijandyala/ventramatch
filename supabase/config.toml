# Generated by `supabase init`. Edit project_id and ports as needed.
project_id = "ventramatch"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]
jwt_expiry = 3600
enable_signup = true
enable_confirmations = false  # set to true before production

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # use magic link for MVP

[storage]
enabled = true
file_size_limit = "50MiB"
