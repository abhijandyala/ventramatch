# https://docs.coderabbit.ai/reference/yaml-template
#
# CodeRabbit auto-review is OFF for this repo. We do not want bot reviews
# blocking PR merges. Reviews can still be invoked on demand by commenting
# `@coderabbitai review` on a PR if anyone wants the bot's take.

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: false
  poem: false
  review_status: false
  collapse_walkthrough: true
  auto_review:
    enabled: false
    drafts: false

chat:
  auto_reply: false
